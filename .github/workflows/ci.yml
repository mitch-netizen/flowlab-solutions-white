name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: flowlab_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Minimal env so config validation passes in CI (non-production values)
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/flowlab_ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/flowlab_ci"
      JWT_SECRET: "ci-test-secret-not-for-production"
      ENCRYPTION_MASTER_KEY: "ci-test-master-key-not-for-production"
      DEFAULT_ROOT_DOMAIN: "flowlabsolutions.au"
      CRON_SECRET: "ci-test-cron-secret"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Lint all workspaces
        run: npm run lint

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Run unit and behaviour tests
        run: npm test

      - name: Build all workspaces
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: "ci"

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: flowlab_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/flowlab_ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/flowlab_ci"
      JWT_SECRET: "ci-test-secret-not-for-production"
      ENCRYPTION_MASTER_KEY: "ci-test-master-key-not-for-production"
      DEFAULT_ROOT_DOMAIN: "flowlabsolutions.au"
      CRON_SECRET: "ci-test-cron-secret"
      NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_ci_test_key"
      SUPABASE_SERVICE_ROLE_KEY: "sb_secret_ci_test_key"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Seed demo tenant
        run: npm run db:seed

      - name: Start web app
        run: |
          npm run build -w @flowlab/web
          npm run start -w @flowlab/web &
          npx wait-on http://localhost:3000 --timeout 30000

      - name: Start portal app
        run: |
          npm run build -w @flowlab/portal
          npm run start -w @flowlab/portal &
          npx wait-on http://localhost:3001 --timeout 30000

      - name: Run E2E smoke tests
        run: npx playwright test tests/e2e/smoke.test.ts
        env:
          WEB_BASE_URL: "http://localhost:3000"
          PORTAL_BASE_URL: "http://lawnorder.localhost:3001"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
